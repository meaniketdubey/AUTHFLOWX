services:
  - type: web
    name: authflowx-api
    runtime: docker

    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: authflowx-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: REDIS_HOST
        fromService:
          type: redis
          name: authflowx-redis
          property: host

      - key: REDIS_PORT
        fromService:
          type: redis
          name: authflowx-redis
          property: port

databases:
  - name: authflowx-db
    plan: free

redis:
  - name: authflowx-redis
    plan: free