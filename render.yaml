services:
  - type: web
    name: authflowx-api
    runtime: docker
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: authflowx-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: REDIS_URL
        fromService:
          name: authflowx-redis
          type: redis
          property: connectionString

databases:
  - name: authflowx-db
    plan: free

redis:
  - name: authflowx-redis
    plan: free