version: "3.9"

services:

  web:
    build: .
    container_name: authflowx_app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    environment:
      SECRET_KEY: mysecretkey
      DATABASE_URL: postgresql://postgres:postgres@db:5432/authflowx

    depends_on:
      - db
      - redis


  db:
    image: postgres:17

    container_name: authflowx_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authflowx

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: authflowx_redis
    
    ports:
      - "6379:6379"

volumes:
  postgres_data: